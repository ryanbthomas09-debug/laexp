<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Unreal Helmet Showcase Room - Multiplayer</title>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
    </script>

    <!-- 🔥 FIREBASE MULTIPLAYER -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            color: white;
            background: rgba(0, 0, 0, 0.45);
            cursor: pointer;
            z-index: 5;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2;
        }

        #crosshair::before,
        #crosshair::after {
            content: "";
            position: absolute;
            background: white;
        }

        #crosshair::before {
            left: 8px;
            top: 0;
            width: 2px;
            height: 18px;
        }

        #crosshair::after {
            top: 8px;
            left: 0;
            width: 18px;
            height: 2px;
        }

        /* 🔥 MULTIPLAYER UI */
        #multiplayerUI {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #66ccff;
            font-family: Arial;
            font-size: 16px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #66ccff;
        }

        #roomLink {
            color: #fff;
            font-size: 12px;
            margin-top: 5px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div id="ui">Click To Enter LAFEST 26' Multiplayer Room</div>
    <div id="crosshair"></div>

    <!-- 🔥 MULTIPLAYER UI -->
    <div id="multiplayerUI">
        <div>👥 <span id="playerCount">1</span> Online</div>
        <div id="roomCode">Loading...</div>
        <div id="roomLink"></div>
    </div>

    <iframe id="phoneUI" src="index.html" style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 340px;
        height: 680px;
        border: none;
        display: none;
        z-index: 999;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    "></iframe>

    <script type="module">

        import * as THREE from "three";
        import { PointerLockControls } from "three/addons/controls/PointerLockControls.js";
        import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
        import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
        import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

        let scene, camera, renderer, controls, composer;

        let move = { f: 0, b: 0, l: 0, r: 0 };
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let helmetObject = null;

        const BOUNDS = {
            minX: -11.5,
            maxX: 11.5,
            minZ: -12,
            maxZ: 12
        };

        init();
        animate();

        // 🔥 FIREBASE MULTIPLAYER SETUP
        // 🔥 FIREBASE MULTIPLAYER SETUP (Fixed disconnects)
        const firebaseConfig = {
            apiKey: "AIzaSyB8YfUchE56P8ISGcsvN__CN5h2AG0kEbU",
            authDomain: "feetlaxx.firebaseapp.com",
            databaseURL: "https://feetlaxx-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "feetlaxx",
            storageBucket: "feetlaxx.firebasestorage.app",
            messagingSenderId: "467535693081",
            appId: "1:467535693081:web:ba61128711a88c4684b188"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room') || 'LAFEST26';
        const roomRef = db.ref(`rooms/${roomCode}`);

        let otherPlayers = {};
        let playerId = 'player_' + Math.random().toString(36).substring(7) + '_' + Date.now();

        // 👇 CRITICAL: Set disconnect handler FIRST
        const playerRef = roomRef.child(`players/${playerId}`);
        playerRef.onDisconnect().remove();  // Auto-cleanup on disconnect

        // Send initial presence
        playerRef.set({
            x: 0, y: 1.6, z: 11, ry: 0,
            connected: true,
            lastSeen: firebase.database.ServerValue.TIMESTAMP
        });

        // Listen for all players
        roomRef.child('players').on('value', (snapshot) => {
            const players = snapshot.val() || {};
            const count = Object.keys(players).filter(id => players[id].connected).length;

            document.getElementById('playerCount').textContent = count;
            document.title = `LAFEST 26' (${count} online)`;

            // Update existing players
            Object.keys(players).forEach(id => {
                if (id !== playerId && players[id].connected) {
                    if (!otherPlayers[id]) {
                        createPlayerAvatar(id, players[id]);
                    } else {
                        otherPlayers[id].position.set(
                            players[id].x || 0,
                            1.6,  // Fixed ground level
                            players[id].z || 11
                        );
                        otherPlayers[id].rotation.y = players[id].ry || 0;
                    }
                }
            });

            // 🔥 IMPROVED CLEANUP: Remove disconnected/stale players
            Object.keys(otherPlayers).forEach(id => {
                if (!players[id] || !players[id].connected) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        });

        document.getElementById('roomCode').textContent = `Room: ${roomCode}`;
        document.getElementById('roomLink').innerHTML =
            `🔗 <a href="?room=${roomCode}" style="color:#66ccff;" target="_blank">${window.location.origin + window.location.pathname}?room=${roomCode}</a>`;

        function createPlayerAvatar(id, data) {
            const group = new THREE.Group();

            const hue = (parseInt(id.slice(-6), 16) / 0xffffff) % 1;
            const bodyMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(hue, 0.7, 0.6),
                emissive: 0x222222,
                emissiveIntensity: 0.4
            });

            // Body
            const bodyGeo = new THREE.CapsuleGeometry(0.25, 1.2);
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.8;
            group.add(body);

            // Head
            const headGeo = new THREE.SphereGeometry(0.22);
            const headMat = new THREE.MeshStandardMaterial({
                color: bodyMat.color,
                emissive: 0x444444,
                emissiveIntensity: 0.6
            });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.75;
            group.add(head);

            // Name tag
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0.9)';
            ctx.fillRect(0, 0, 256, 64);
            ctx.fillStyle = '#66ccff';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(id.slice(0, 8), 128, 38);

            const nameTexture = new THREE.CanvasTexture(canvas);
            const nameMat = new THREE.MeshBasicMaterial({ map: nameTexture, transparent: true });
            const nameTag = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 0.5), nameMat);
            nameTag.position.y = 2.3;
            group.add(nameTag);

            // Position on ground
            group.position.set(data.x || 0, 0, data.z || 11);  // Base Y=0
            scene.add(group);
            otherPlayers[id] = group;
        }

        // PERFECT sendPosition
        function sendPosition() {
            if (!controls.isLocked) return;
            const pos = controls.getObject().position;
            playerRef.update({  // Use update for efficiency
                x: parseFloat(pos.x.toFixed(2)),
                z: parseFloat(pos.z.toFixed(2)),
                ry: parseFloat(camera.rotation.y.toFixed(2)),
                connected: true,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            });
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            playerRef.remove();
        });
        function init() {

            // ---------------- SCENE ----------------

            scene = new THREE.Scene();

            scene.fog = new THREE.Fog(0x211914, 18, 70);

            camera = new THREE.PerspectiveCamera(
                75,
                innerWidth / innerHeight,
                0.1,
                1000
            );

            camera.position.set(0, 1.6, 8);

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });

            renderer.setSize(innerWidth, innerHeight);

            renderer.setPixelRatio(devicePixelRatio);

            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.15;
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            document.body.appendChild(renderer.domElement);

            // ---------------- ENVIRONMENT ----------------

            scene.environment = new THREE.CubeTextureLoader()
                .setPath("https://threejs.org/examples/textures/cube/Bridge2/")
                .load([
                    "posx.jpg", "negx.jpg",
                    "posy.jpg", "negy.jpg",
                    "posz.jpg", "negz.jpg"
                ]);

            // ---------------- LIGHTING ----------------

            scene.add(new THREE.AmbientLight(0xffe6c7, 0.35));

            const mainLight = new THREE.DirectionalLight(0xffe3c4, 1.3);
            mainLight.position.set(12.5, 25, 10);
            scene.add(mainLight);

            const blueFill = new THREE.DirectionalLight(0x6da7ff, 0.35);
            blueFill.position.set(-12.5, 10, -10);
            scene.add(blueFill);

            const hemi = new THREE.HemisphereLight(
                0xffd7b5,
                0x1d120d,
                0.55
            );

            scene.add(hemi);

            // ---------------- ROOM ----------------

            const room = new THREE.Mesh(
                new THREE.BoxGeometry(25, 18, 28),
                new THREE.MeshStandardMaterial({
                    color: 0x080B33,
                    roughness: 0.95,
                    metalness: 0,
                    envMapIntensity: 0,
                    side: THREE.BackSide
                })
            );

            scene.add(room);

            // ---------------- FLOOR ----------------

            const floorTex = new THREE.TextureLoader().load(
                "https://threejs.org/examples/textures/hardwood2_diffuse.jpg"
            );

            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(6, 4);

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(25, 28),
                new THREE.MeshStandardMaterial({
                    map: floorTex,
                    color: 0x4a2f1f,
                    roughness: 0.25,
                    metalness: 0.7
                })
            );

            floor.rotation.x = -Math.PI / 2;

            scene.add(floor);

            // ---------------- DOOR ----------------

            function createDoor() {

                const doorGroup = new THREE.Group();

                const frameMat = new THREE.MeshStandardMaterial({
                    color: 0x1a1147,
                    roughness: 0.1
                });

                const glassMat = new THREE.MeshPhysicalMaterial({
                    color: 0xbfd9ff,
                    transmission: 0.9,
                    roughness: 0.1,
                    thickness: 1,
                    ior: 1.5
                });

                const frame = new THREE.Mesh(
                    new THREE.BoxGeometry(3.2, 5.2, 0.3),
                    frameMat
                );

                frame.position.set(0, 2.6, 13.8);

                doorGroup.add(frame);

                const glass = new THREE.Mesh(
                    new THREE.PlaneGeometry(2.8, 4.8),
                    glassMat
                );

                glass.position.set(0, 2.6, 13.96);

                doorGroup.add(glass);

                const glow = new THREE.PointLight(
                    0x8fc7ff,
                    1.5,
                    18
                );

                glow.position.set(0, 4, 12);

                scene.add(glow);

                scene.add(doorGroup);
            }

            createDoor();

            // ---------------- CENTER PLATFORM ----------------

            function createPlatform() {

                const platform = new THREE.Mesh(
                    new THREE.CylinderGeometry(
                        3,
                        3.2,
                        1,
                        64
                    ),
                    new THREE.MeshStandardMaterial({
                        color: 0x2d2d2d,
                        roughness: 0.35,
                        metalness: 0.8
                    })
                );

                platform.position.set(0, 0.5, 0);

                scene.add(platform);

                const glowRing = new THREE.Mesh(
                    new THREE.TorusGeometry(3.1, 0.08, 16, 100),
                    new THREE.MeshStandardMaterial({
                        color: 0x66ccff,
                        emissive: 0x66ccff,
                        emissiveIntensity: 3
                    })
                );

                glowRing.rotation.x = Math.PI / 2;
                glowRing.position.y = 1.02;

                scene.add(glowRing);

                function animatePlatform() {
                    glowRing.rotation.z += 0.0992;
                    requestAnimationFrame(animatePlatform);
                }
                animatePlatform();
            }

            createPlatform();

            // ---------------- HELMET ----------------
            function createHelmet() {

                const loader = new GLTFLoader();

                loader.load(
                    "https://threejs.org/examples/models/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf",

                    function (gltf) {

                        const helmet = gltf.scene;

                        helmet.scale.set(2.2, 2.2, 2.2);
                        helmet.position.set(0, 3.0, 0);

                        scene.add(helmet);

                        helmetObject = helmet;

                        helmet.traverse(obj => {
                            obj.userData.clickable = true;
                        });

                        function animateHelmet() {
                            helmet.rotation.y += 0.003;
                            requestAnimationFrame(animateHelmet);
                        }
                        animateHelmet();

                        const spot = new THREE.SpotLight(0xffffff, 5, 50, Math.PI / 6, 0.4);
                        spot.position.set(0, 10, 5);
                        spot.target = helmet;

                        scene.add(spot);
                        scene.add(spot.target);

                        const rim = new THREE.PointLight(0x66ccff, 1.5, 15);
                        rim.position.set(3, 3, -3);
                        scene.add(rim);
                    }
                );
            }
            createHelmet();

            // ---------------- CEILING LIGHTS ----------------

            function createCeilingLights() {

                const positions = [
                    [-8.5, 8, -6],
                    [0, 8, -6],
                    [8.5, 8, -6],
                    [-8.5, 8, 6],
                    [0, 8, 6],
                    [8.5, 8, 6]
                ];

                positions.forEach(p => {

                    const lamp = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2, 0.2, 0.7),
                        new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            emissive: 0xffffff,
                            emissiveIntensity: 1.4
                        })
                    );

                    lamp.position.set(p[0], p[1], p[2]);

                    scene.add(lamp);

                    const point = new THREE.PointLight(
                        0xfff1d6,
                        1.4,
                        24
                    );

                    point.position.set(p[0], p[1] - 0.4, p[2]);

                    scene.add(point);
                });
            }

            createCeilingLights();

            // ---------------- POSTERS ----------------

            function createPoster(x, y, z, rotY, imageURL) {

                const tex = new THREE.TextureLoader().load(imageURL, () => {

                    const ratio = tex.image.width / tex.image.height;

                    const height = 5;
                    const width = height * ratio;

                    poster.geometry.dispose();
                    poster.geometry = new THREE.PlaneGeometry(width, height);
                });

                tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                tex.colorSpace = THREE.SRGBColorSpace;

                const frame = new THREE.Mesh(
                    new THREE.BoxGeometry(3.9, 5.4, 0.15),
                    new THREE.MeshStandardMaterial({
                        color: 0x1b1b1b,
                        roughness: 0.6
                    })
                );

                frame.position.set(x, y, z);
                frame.rotation.y = rotY;

                scene.add(frame);

                const poster = new THREE.Mesh(
                    new THREE.PlaneGeometry(3, 5),
                    new THREE.MeshStandardMaterial({
                        map: tex,
                        roughness: 0.6,
                        metalness: 0.1
                    })
                );

                poster.position.set(
                    x + Math.sin(rotY) * 0.09,
                    y,
                    z + Math.cos(rotY) * 0.09
                );

                poster.rotation.y = rotY;

                scene.add(poster);

            }

            const posterImages = [
                "./images/poster1.jpeg",
                "./images/poster2.jpeg",
                "./images/poster3.jpeg",
                "./images/poster4.jpeg",
                "./images/poster5.jpeg",
                "./images/poster6.jpeg",
                "./images/poster7.jpeg",
                "./images/poster8.jpg"
            ];

            // LEFT WALL (3)
            createPoster(-12, 4, -8, Math.PI / 2, posterImages[0]);
            createPoster(-12, 4, 0, Math.PI / 2, posterImages[1]);
            createPoster(-12, 4, 8, Math.PI / 2, posterImages[2]);

            // RIGHT WALL (3)
            createPoster(12, 4, -8, -Math.PI / 2, posterImages[3]);
            createPoster(12, 4, 0, -Math.PI / 2, posterImages[4]);
            createPoster(12, 4, 8, -Math.PI / 2, posterImages[5]);

            // DOOR SIDE POSTERS
            createPoster(-9, 4, 13.4, Math.PI, posterImages[6]);
            createPoster(9, 4, 13.4, Math.PI, posterImages[7]);

            function createWallText() {

                const canvas = document.createElement("canvas");
                canvas.width = 1024;
                canvas.height = 512;

                const ctx = canvas.getContext("2d");

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 120px Arial";
                ctx.textAlign = "center";
                ctx.fillText("LAFEST 26'", canvas.width / 2, 200);

                ctx.font = "bold 50px Arial";
                ctx.fillStyle = "#dddddd";
                ctx.fillText(
                    "A Chronicle Forged, A Genesis Exalted",
                    canvas.width / 2,
                    320
                );

                const texture = new THREE.CanvasTexture(canvas);
                texture.colorSpace = THREE.SRGBColorSpace;

                const material = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true
                });

                const mesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(14, 7),
                    material
                );

                mesh.position.set(0, 4, -13.4);
                const light = new THREE.PointLight(0xffffff, 1.5, 20);
                light.position.set(0, 8, -10);
                scene.add(light);

                scene.add(mesh);
            }

            createWallText();

            // ---------------- CONTROLS ----------------

            controls = new PointerLockControls(
                camera,
                document.body
            );

            scene.add(controls.getObject());

            controls.getObject().position.set(0, 1.6, 11);

            document.getElementById("ui").onclick = () => {
                controls.lock();
            };

            controls.addEventListener("lock", () => {
                document.getElementById("ui").style.display = "none";
            });

            controls.addEventListener("unlock", () => {
                document.getElementById("ui").style.display = "flex";
            });

            // ---------------- MOVEMENT ----------------

            document.addEventListener("keydown", e => {

                if (e.code === "KeyW") move.f = 1;
                if (e.code === "KeyS") move.b = 1;
                if (e.code === "KeyA") move.l = 1;
                if (e.code === "KeyD") move.r = 1;
            });

            document.addEventListener("keyup", e => {

                if (e.code === "KeyW") move.f = 0;
                if (e.code === "KeyS") move.b = 0;
                if (e.code === "KeyA") move.l = 0;
                if (e.code === "KeyD") move.r = 0;
            });

            // ---------------- POST PROCESSING ----------------

            composer = new EffectComposer(renderer);

            composer.addPass(new RenderPass(scene, camera));

            composer.addPass(new UnrealBloomPass(
                new THREE.Vector2(innerWidth, innerHeight),
                0.5,
                0.7,
                0.8
            ));

            // ---------------- RESIZE ----------------

            window.addEventListener("resize", () => {

                camera.aspect = innerWidth / innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(innerWidth, innerHeight);

                composer.setSize(innerWidth, innerHeight);
            });
        }

        function openPhoneUI() {
            const ui = document.getElementById("phoneUI");
            ui.style.display = "block";
            controls.unlock();
        }

        window.closePhoneUI = function () {
            document.getElementById("phoneUI").style.display = "none";
            controls.lock();
        };

        document.addEventListener("click", () => {

            if (!controls.isLocked) return;

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            const intersects = raycaster.intersectObjects(scene.children, true);

            for (let hit of intersects) {

                let obj = hit.object;

                while (obj) {

                    if (obj.userData.clickable) {
                        openPhoneUI();
                        return;
                    }

                    obj = obj.parent;
                }
            }
        });

        // ---------------- PLAYER BOUNDS ----------------

        function clampPosition() {

            const p = controls.getObject().position;

            p.x = Math.max(
                BOUNDS.minX,
                Math.min(BOUNDS.maxX, p.x)
            );

            p.z = Math.max(
                BOUNDS.minZ,
                Math.min(BOUNDS.maxZ, p.z)
            );

            const dx = p.x;
            const dz = p.z;

            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist < 3.8) {

                const angle = Math.atan2(dz, dx);

                p.x = Math.cos(angle) * 3.8;
                p.z = Math.sin(angle) * 3.8;
            }

        }

        // ---------------- MULTIPLAYER ANIMATE ----------------

        function animate() {

            requestAnimationFrame(animate);

            const speed = 0.12;

            const forward = (move.f - move.b) * speed;

            const strafe = (move.r - move.l) * speed;

            controls.moveForward(forward);

            controls.moveRight(strafe);

            clampPosition();

            // 🔥 SEND POSITION TO FIREBASE (60fps sync)
            sendPosition();

            composer.render();
        }

    </script>
</body>

</html>
